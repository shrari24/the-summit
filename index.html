<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OctaCon - القمة v10.0</title>
    <!-- تحديث المكتبة للإصدار r160 لدعم الأشكال الواقعية -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { margin: 0; overflow: hidden; font-family: 'Cairo', sans-serif; background: #020617; color: white; touch-action: none; user-select: none; }
        canvas { display: block; }
        .ui-screen { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        .interactive { pointer-events: auto; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; }
        
        #radar { position: absolute; top: 20px; right: 20px; width: 130px; height: 130px; border: 2px solid #3b82f6; border-radius: 50%; overflow: hidden; background: rgba(0,0,0,0.8); }
        #radar-canvas { width: 100%; height: 100%; }

        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); }
        #joy-stick { position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; background: white; border-radius: 50%; box-shadow: 0 0 20px #3b82f6; }
        
        .action-btn { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.2); font-size: 2rem; transition: 0.2s; }
        .action-btn:active { transform: scale(0.9); background: white; color: black; }
        
        #loading { position: fixed; inset: 0; background: #020617; display: flex; flex-direction: column; items-center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-xl font-black text-white italic uppercase">جاري تشغيل القمة v10.0</h2>
    </div>

    <div class="ui-screen">
        <div id="menu" class="absolute inset-0 glass flex flex-col items-center justify-center p-8 interactive">
            <h1 class="text-7xl font-black italic mb-2 text-white uppercase italic">القمة</h1>
            <p class="text-blue-500 font-bold tracking-[0.4em] mb-12 text-[10px] uppercase italic">OctaCon Project</p>
            <button onclick="start()" class="w-full max-w-sm py-8 bg-blue-600 rounded-[2.5rem] font-black text-2xl shadow-2xl active:scale-95">دخول الميدان</button>
        </div>

        <div id="hud" class="hidden w-full h-full p-6 flex flex-col justify-between">
            <div class="flex justify-between items-start">
                <div class="glass px-6 py-3 border-blue-500/30">
                    <span id="mode" class="text-blue-400 text-[10px] font-bold block uppercase text-center">المشي</span>
                    <span id="gold" class="text-xl font-black text-yellow-500">0 🪙</span>
                </div>
                <div id="radar"><canvas id="radar-canvas"></canvas></div>
            </div>

            <div id="ctrls" class="hidden w-full h-full relative interactive">
                <div id="joy-base"><div id="joy-stick"></div></div>
                <div class="absolute bottom-10 right-10 flex flex-col gap-6">
                    <button id="car-btn" onclick="drive()" class="action-btn bg-yellow-600 hidden">🚗</button>
                    <button onmousedown="shooting=true" onmouseup="shooting=false" ontouchstart="shooting=true" ontouchend="shooting=false" class="action-btn bg-red-600">🔥</button>
                    <button onclick="jump()" class="action-btn bg-slate-700 text-xl font-black">⏫</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, player, clock, state='MENU', joy={x:0, y:0}, shooting=false;
        let humans = [], cars = [], mapCtx, mapCanvas;
        let currentCar = null, driving = false;

        function init() {
            try {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x020617);
                scene.fog = new THREE.FogExp2(0x020617, 0.0015);
                
                camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 4000);
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                document.body.appendChild(renderer.domElement);

                scene.add(new THREE.HemisphereLight(0x4433aa, 0x111122, 1.5));
                const sun = new THREE.DirectionalLight(0xffffff, 1.2);
                sun.position.set(100, 500, 100);
                scene.add(sun);

                mapCanvas = document.getElementById('radar-canvas');
                mapCtx = mapCanvas.getContext('2d');
                mapCanvas.width = 130; mapCanvas.height = 130;

                buildCity();
                clock = new THREE.Clock();
                
                document.getElementById('loading').style.display = 'none';
                animate();
                setupJoy();
            } catch (e) {
                console.error("خطأ في التحميل:", e);
                alert("حدث خطأ تقني، تأكد من تحديث الصفحة.");
            }
        }

        function createHuman(c = 0xef4444) {
            const g = new THREE.Group();
            // استخدام CylinderGeometry كبديل آمن لضمان التوافق
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 2, 8), new THREE.MeshPhongMaterial({color: c}));
            body.position.y = 1; g.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.45), new THREE.MeshPhongMaterial({color: 0xffdbac}));
            head.position.y = 2.4; g.add(head);
            return g;
        }

        function createCar(c = 0x3b82f6) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(8, 2, 16), new THREE.MeshPhongMaterial({color: c}));
            body.position.y = 1; g.add(body);
            const top = new THREE.Mesh(new THREE.BoxGeometry(6, 2, 8), new THREE.MeshPhongMaterial({color: 0x000000, transparent:true, opacity:0.8}));
            top.position.set(0, 2.5, -1); g.add(top);
            return g;
        }

        function buildCity() {
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(4000, 4000), new THREE.MeshPhongMaterial({color: 0x0f172a}));
            floor.rotation.x = -Math.PI/2; scene.add(floor);
            scene.add(new THREE.GridHelper(4000, 40, 0x1e293b, 0x0f172a));

            for(let i=0; i<40; i++) {
                const h = 50 + Math.random()*200;
                const b = new THREE.Mesh(new THREE.BoxGeometry(130, h, 130), new THREE.MeshPhongMaterial({color: 0x020617}));
                b.position.set((Math.random()-0.5)*3000, h/2, (Math.random()-0.5)*3000);
                scene.add(b);
            }
            // إضافة سيارات وأوادم
            for(let i=0; i<15; i++) {
                const c = createCar(); c.position.set((Math.random()-0.5)*2500, 0, (Math.random()-0.5)*2500);
                scene.add(c); cars.push(c);
                const h = createHuman(); h.position.set((Math.random()-0.5)*2500, 0, (Math.random()-0.5)*2500);
                scene.add(h); humans.push(h);
            }
        }

        function start() {
            state = 'PLAY'; document.getElementById('menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden'); document.getElementById('ctrls').classList.remove('hidden');
            player = createHuman(0x3b82f6); scene.add(player);
            player.add(camera); camera.position.set(0, 10, 25);
        }

        function drive() {
            if(driving) {
                driving = false; player.visible = true; player.position.copy(currentCar.position).add(new THREE.Vector3(15,0,0));
                player.add(camera); camera.position.set(0, 10, 25);
                document.getElementById('mode').innerText = "المشي";
            } else {
                const near = cars.find(c => c.position.distanceTo(player.position) < 25);
                if(near) { driving = true; currentCar = near; player.visible = false;
                    currentCar.add(camera); camera.position.set(0, 25, 50);
                    document.getElementById('mode').innerText = "القيادة";
                }
            }
        }

        function jump() { if(!driving && player.position.y <= 0.1) player.position.y = 25; }

        function updateRadar() {
            mapCtx.fillStyle = '#000'; mapCtx.fillRect(0,0,130,130);
            const m = 65, s = 0.05;
            humans.forEach(h => { mapCtx.fillStyle = '#f00'; mapCtx.beginPath(); mapCtx.arc(m+(h.position.x-player.position.x)*s, m+(h.position.z-player.position.z)*s, 2, 0, 7); mapCtx.fill(); });
            mapCtx.fillStyle = '#3b82f6'; mapCtx.beginPath(); mapCtx.arc(m, m, 4, 0, 7); mapCtx.fill();
            mapCtx.strokeStyle = '#fff'; mapCtx.stroke();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(state === 'PLAY') {
                if(!driving) {
                    player.rotation.y -= joy.x * 0.05; player.translateZ(-joy.y * 2.5);
                    if(player.position.y > 0) player.position.y -= 1.0;
                    const nearCar = cars.some(c => c.position.distanceTo(player.position) < 25);
                    document.getElementById('car-btn').classList.toggle('hidden', !nearCar);
                } else {
                    currentCar.rotation.y -= joy.x * 0.04; currentCar.translateZ(-joy.y * 5.0);
                }
                updateRadar();
            }
            renderer.render(scene, camera);
        }

        function setupJoy() {
            const b = document.getElementById('joy-base'), s = document.getElementById('joy-stick'); let active = false;
            const mv = (e) => {
                if(!active) return; const r = b.getBoundingClientRect(), cx = r.left + r.width/2, cy = r.top + r.height/2;
                const tx = (e.touches ? e.touches[0].clientX : e.clientX) - cx, ty = (e.touches ? e.touches[0].clientY : e.clientY) - cy;
                const d = Math.min(Math.sqrt(tx*tx+ty*ty), 35), a = Math.atan2(ty, tx);
                s.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                joy = { x: (Math.cos(a)*d)/35, y: (Math.sin(a)*d)/35 };
            };
            b.addEventListener('touchstart', (e) => { active = true; e.preventDefault(); });
            window.addEventListener('touchmove', mv);
            window.addEventListener('touchend', () => { active = false; s.style.transform = ''; joy = {x:0, y:0}; });
        }
        window.onload = init;
    </script>
</body>
</html>
