<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>القمة - النسخة العالمية</title>
    <!-- إعدادات التطبيق المثبت PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { margin: 0; overflow: hidden; font-family: 'Cairo', sans-serif; background: #020617; color: white; touch-action: none; }
        .ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        .interactive { pointer-events: auto; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; }
        #joystick-base { position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }
        #joystick-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: white; border-radius: 50%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .action-btn { width: 75px; height: 75px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); border: 2px solid white; font-size: 1.5rem; }
        .action-btn:active { transform: scale(0.9); background: white; color: black; }
    </style>
</head>
<body>

    <div class="ui-layer">
        <!-- القائمة الرئيسية -->
        <div id="main-menu" class="absolute inset-0 glass flex flex-col items-center justify-center p-8 interactive">
            <h1 class="text-8xl font-black italic mb-2 tracking-tighter text-white uppercase italic">القمة</h1>
            <p class="text-blue-500 font-bold tracking-[0.4em] mb-12 text-xs uppercase">BATTLE ROYALE GLOBAL</p>
            
            <div class="w-full max-w-sm flex flex-col gap-4">
                <input id="p-name-input" type="text" placeholder="اسمك المقاتل..." class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl text-center font-bold text-xl outline-none focus:border-blue-500">
                <div class="flex justify-between items-center px-4">
                    <span class="text-slate-400">الذهب:</span>
                    <span id="gold-ui" class="text-yellow-500 font-black text-2xl">0 🪙</span>
                </div>
                <button onclick="startGame()" class="w-full py-8 bg-blue-600 rounded-[2.5rem] font-black text-3xl shadow-2xl active:scale-95 transition">بدء المهمة</button>
            </div>
        </div>

        <!-- واجهة اللعب HUD -->
        <div id="hud" class="hidden w-full h-full p-6 flex flex-col justify-between">
            <div class="flex justify-between items-start">
                <div class="glass px-6 py-3 border-blue-500/30 text-2xl font-black"><span id="alive">100</span> 👥</div>
                <div class="glass px-6 py-3 border-yellow-500/30 text-2xl font-black text-yellow-500"><span id="gold-hud">0</span> 🪙</div>
            </div>

            <div id="jump-zone" class="absolute inset-0 flex items-center justify-center interactive hidden">
                <button onclick="doParachuteJump()" class="px-20 py-8 bg-yellow-500 text-black font-black text-4xl rounded-full shadow-2xl animate-bounce">اقفز! 🪂</button>
            </div>

            <div id="controls" class="hidden w-full h-full relative interactive">
                <div id="joystick-base"><div id="joystick-stick"></div></div>
                <div class="absolute bottom-10 right-10 flex flex-col gap-6">
                    <button onmousedown="shooting=true" onmouseup="shooting=false" ontouchstart="shooting=true" ontouchend="shooting=false" class="action-btn bg-red-600 border-none shadow-2xl">🔥</button>
                    <div class="flex gap-4">
                        <button onclick="buildWall()" class="action-btn bg-blue-600 border-none">🧱</button>
                        <button onclick="heroJump()" class="action-btn bg-slate-700 border-none">⏫</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, clock, player, plane;
        let gState = 'MENU', gold = parseInt(localStorage.getItem('peak_gold')) || 0;
        let enemies = [], bullets = [], joystick = {x:0, y:0}, shooting = false;

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x020617);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
            renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.4));
            const sun = new THREE.DirectionalLight(0xffffff, 1); sun.position.set(50, 300, 50); scene.add(sun);
            const grid = new THREE.GridHelper(2000, 40, 0x1e293b, 0x0f172a); scene.add(grid);
            clock = new THREE.Clock(); updateUI(); animate();
        }

        function startGame() {
            const n = document.getElementById('p-name-input').value; if(n) localStorage.setItem('p_name', n);
            gState = 'PLANE'; document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden'); document.getElementById('jump-zone').classList.remove('hidden');
            plane = new THREE.Mesh(new THREE.BoxGeometry(10,5,30), new THREE.MeshPhongMaterial({color: 0x334155}));
            plane.position.set(0, 400, 800); scene.add(plane);
            player = new THREE.Mesh(new THREE.BoxGeometry(2,4,2), new THREE.MeshPhongMaterial({color: 0x3b82f6})); scene.add(player);
        }

        function doParachuteJump() {
            gState = 'FALLING'; document.getElementById('jump-zone').classList.add('hidden');
            player.position.copy(plane.position); player.add(camera); camera.position.set(0,5,15);
        }

        function buildWall() {
            const w = new THREE.Mesh(new THREE.BoxGeometry(8,6,1.5), new THREE.MeshPhongMaterial({color: 0x3b82f6, transparent: true, opacity: 0.6}));
            const d = new THREE.Vector3(0,0,-1).applyQuaternion(player.quaternion);
            w.position.copy(player.position).add(d.multiplyScalar(10)); w.position.y=3;
            w.quaternion.copy(player.quaternion); scene.add(w);
        }

        function heroJump() { if(player.position.y <= 2.2) player.position.y = 15; }

        function updateUI() {
            document.getElementById('gold-ui').innerText = gold.toLocaleString() + ' 🪙';
            document.getElementById('gold-hud').innerText = gold.toLocaleString();
            localStorage.setItem('peak_gold', gold);
        }

        function animate() {
            requestAnimationFrame(animate); const dt = clock.getDelta();
            if(gState === 'PLANE') {
                plane.position.z -= 2; camera.position.set(plane.position.x, plane.position.y+40, plane.position.z+80); camera.lookAt(plane.position);
            } else if(gState === 'FALLING') {
                player.position.y -= 2.5; player.position.z -= 0.5;
                if(player.position.y <= 2) {
                    gState = 'GROUND'; player.position.y = 2; document.getElementById('controls').classList.remove('hidden');
                    for(let i=0; i<80; i++) {
                        const en = new THREE.Mesh(new THREE.BoxGeometry(2,4,2), new THREE.MeshPhongMaterial({color: 0xef4444}));
                        en.position.set((Math.random()-0.5)*1500, 2, (Math.random()-0.5)*1500); scene.add(en); enemies.push(en);
                    }
                }
            } else if(gState === 'GROUND') {
                player.rotation.y -= joystick.x * 0.05; player.translateZ(-joystick.y * 1.3);
            }
            renderer.render(scene, camera);
        }

        const b = document.getElementById('joystick-base'), s = document.getElementById('joystick-stick'); let active = false;
        b.addEventListener('touchstart', (e) => { active = true; e.preventDefault(); });
        window.addEventListener('touchmove', (e) => {
            if(!active) return; const r = b.getBoundingClientRect(), cx = r.left + r.width/2, cy = r.top + r.height/2;
            const tx = e.touches[0].clientX - cx, ty = e.touches[0].clientY - cy, d = Math.min(Math.sqrt(tx*tx+ty*ty), 35);
            const a = Math.atan2(ty, tx); s.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
            joystick = { x: (Math.cos(a)*d)/35, y: (Math.sin(a)*d)/35 };
        });
        window.addEventListener('touchend', () => { active = false; s.style.transform = ''; joystick = {x:0, y:0}; });
        window.onload = init;
    </script>
</body>
</html>
